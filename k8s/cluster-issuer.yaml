apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production. cert-manager registers with this email and
    # stores the ACME account key in the secret below.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: apps.techenrage@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      # HTTP-01: cert-manager proves domain ownership by serving a token at
      # http://app.chishty.me/.well-known/acme-challenge/... through the nginx ingress.
      - http01:
          ingress:
            class: nginx
