# EXAMPLE ONLY — never commit real secrets. This shows the shape of the Secret.
# The real Secret is created at deploy time from the Terraform output, so the
# password never touches git:
#
#   kubectl -n app create secret generic backend-secret \
#     --from-literal=DB_PASSWORD="$(terraform -chdir=terraform output -raw db_admin_password)"
#
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: app
type: Opaque
stringData:
  DB_PASSWORD: "replace-me-not-a-real-password"
