server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend service. In Docker Compose and Kubernetes the
  # backend is reachable by its service name "backend" on port 8080. Keeping the
  # /api prefix (no trailing slash on proxy_pass) means /api/info reaches the
  # backend unchanged.
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Single-page app: any unknown path falls back to index.html so client-side
  # routing works and a refresh on a deep link doesn't 404.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
